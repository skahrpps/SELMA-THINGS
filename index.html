<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selma Things</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Special+Elite&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Special+Elite', monospace;
            background: url('bg.jpg') no-repeat center center fixed;
            background-size: cover;
            color: white;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            height: 100vh;
            padding-bottom: 60px;
        }

        .box {
            background: rgba(0, 0, 0, 0.75);
            padding: 30px 35px;
            border-radius: 5px;
            text-align: center;
            max-width: 420px;
            width: 90%;
            border: 1px solid rgba(255, 60, 60, 0.3);
            box-shadow: 0 0 40px rgba(200, 0, 0, 0.2);
        }

        h1 {
            font-family: 'Special Elite', monospace;
            font-size: 1.1em;
            margin-bottom: 20px;
            color: #cc3333;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 0 0 10px rgba(200, 0, 0, 0.5);
        }

        input {
            width: 80%;
            padding: 14px;
            font-size: 1.1em;
            font-family: 'Special Elite', monospace;
            border: none;
            border-radius: 3px;
            margin-bottom: 15px;
            background: #111;
            color: #e8e8e8;
            outline: none;
            letter-spacing: 2px;
            text-align: center;
        }


        input:focus {
            border-color: #cc3333;
            box-shadow: 0 0 15px rgba(200, 0, 0, 0.3);
        }

        input::placeholder {
            color: #555;
            font-style: italic;
        }

        button {
            background: #8b0000;
            color: #ddd;
            border: 2px solid #aa2222;
            padding: 14px 40px;
            font-size: 1.1em;
            font-family: 'Special Elite', monospace;
            border-radius: 3px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 3px;
            transition: all 0.3s;
        }

        button:hover {
            background: #aa0000;
            box-shadow: 0 0 20px rgba(200, 0, 0, 0.5);
            color: white;
        }

        /* === Status-Leuchte === */
        .status-wrap {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .lamp {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #aa0000;
            box-shadow: 0 0 8px #aa0000;
            transition: all 0.5s;
        }

        .lamp.online {
            background: #00cc66;
            box-shadow: 0 0 12px #00cc66, 0 0 25px #00cc66;
        }

        .status-text {
            font-family: 'Special Elite', monospace;
            font-size: 0.75em;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #777;
        }

        /* === Gesendete Nachricht === */
        #gesendet {
            margin-top: 12px;
            font-size: 0.8em;
            color: #666;
            font-family: 'Special Elite', monospace;
            min-height: 1.2em;
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>Nachricht senden</h1>
        <input type="text" id="nachricht" placeholder="was willst du sagen..." maxlength="50">
        <br>
        <button onclick="senden()">Senden</button>
        <div id="gesendet"></div>

        <div class="status-wrap">
            <div class="lamp" id="lamp"></div>
            <div class="status-text" id="statusText">offline</div>
        </div>
    </div>

    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <script>
        var lamp = document.getElementById('lamp');
        var statusText = document.getElementById('statusText');
        var gesendet = document.getElementById('gesendet');

        var client = mqtt.connect('wss://broker.hivemq.com:8884/mqtt');

        client.on('connect', function () {
            lamp.classList.add('online');
            statusText.innerText = 'online';
            statusText.style.color = '#00cc66';
        });

        client.on('error', function () {
            lamp.classList.remove('online');
            statusText.innerText = 'offline';
            statusText.style.color = '#aa0000';
        });

        client.on('close', function () {
            lamp.classList.remove('online');
            statusText.innerText = 'offline';
            statusText.style.color = '#aa0000';
        });

        function senden() {
            var text = document.getElementById('nachricht').value;
            if (text.length === 0) return;
            client.publish('ardspy/nachricht', text);
            gesendet.innerText = '📨 "' + text + '"';
            document.getElementById('nachricht').value = '';
        }

        document.getElementById('nachricht').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') senden();
        });
    </script>
</body>
</html>
